name: Build Add-on Image (dev)

# Builds the Docker image on pushes to main for CI verification.
# Does NOT push to GHCR — release builds are handled by release.yml on tags.

on:
  push:
    branches: [main]
    paths:
      - "aipresence/**"
  pull_request:
    paths:
      - "aipresence/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (amd64 only, no push)
        uses: docker/build-push-action@v6
        with:
          context: aipresence
          file: aipresence/Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
