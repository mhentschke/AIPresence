name: CI

on:
  push:
  pull_request:

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check aipresence/backend/

  test-backend:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}/aipresence
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Create venv and install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r aipresence/backend/requirements.txt
          pip install pytest httpx
      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest aipresence/backend/tests/ -v

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: aipresence/client
      - run: npx vitest run
        working-directory: aipresence/client

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
        working-directory: aipresence/client
      - run: npm run build
        working-directory: aipresence/client

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t aipresence:ci -f aipresence/Dockerfile aipresence
