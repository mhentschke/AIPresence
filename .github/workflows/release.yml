name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is_prerelease: ${{ steps.extract.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate version consistency
        run: |
          TAG_VERSION="${{ steps.extract.outputs.version }}"

          ADDON_VERSION=$(grep '^version:' aipresence/config.yaml | sed 's/version: *"\?\([^"]*\)"\?/\1/')
          INTEGRATION_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/aipresence/manifest.json'))['version'])")
          FRONTEND_VERSION=$(python3 -c "import json; print(json.load(open('aipresence/client/package.json'))['version'])")

          echo "Tag version:         $TAG_VERSION"
          echo "Add-on version:      $ADDON_VERSION"
          echo "Integration version: $INTEGRATION_VERSION"
          echo "Frontend version:    $FRONTEND_VERSION"

          MISMATCH=0
          if [[ "$ADDON_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Add-on version ($ADDON_VERSION) does not match tag ($TAG_VERSION)"
            MISMATCH=1
          fi
          if [[ "$INTEGRATION_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Integration version ($INTEGRATION_VERSION) does not match tag ($TAG_VERSION)"
            MISMATCH=1
          fi
          if [[ "$FRONTEND_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Frontend version ($FRONTEND_VERSION) does not match tag ($TAG_VERSION)"
            MISMATCH=1
          fi

          if [[ $MISMATCH -eq 1 ]]; then
            echo ""
            echo "Run ./scripts/bump-version.sh $TAG_VERSION --tag to fix this."
            exit 1
          fi

          echo "✓ All versions match $TAG_VERSION"

  build-and-push:
    needs: validate-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64
          - arch: armv7
            platform: linux/arm/v7
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine image tags
        id: tags
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          IS_PRE="${{ needs.validate-version.outputs.is_prerelease }}"
          ARCH="${{ matrix.arch }}"
          BASE="${{ env.REGISTRY }}/mhentschke/aipresence-${ARCH}"

          # Always tag with the exact version
          TAGS="${BASE}:${VERSION}"

          # Only tag 'latest' for stable releases — never for pre-releases
          if [[ "$IS_PRE" == "false" ]]; then
            TAGS="${TAGS},${BASE}:latest"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: aipresence
          file: aipresence/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    needs: [validate-version, build-and-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [[ -z "$PREV_TAG" || "$PREV_TAG" == "v${{ needs.validate-version.outputs.version }}" ]]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            CHANGES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s" --no-merges | head -50)
            # Write multiline output
            {
              echo "body<<EOF"
              echo "$CHANGES"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ needs.validate-version.outputs.version }}"
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ needs.validate-version.outputs.is_prerelease }}
