# Home Assistant Add-on manifest — DEV channel
# This add-on tracks pre-release/dev builds.
# Install alongside the stable "AIPresence" add-on for testing.
name: AIPresence Dev
version: "0.1.0"
slug: aipresence-dev
description: "AIPresence development build — room-level presence detection (pre-release)"
url: "https://github.com/mhentschke/AIPresence"
image: ghcr.io/mhentschke/aipresence-dev-{arch}
arch:
  - amd64
  - aarch64
  - armv7
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: "mdi:crosshairs-gps"
panel_title: "AIPresence Dev"
map:
  - type: data
    read_only: false
options:
  sample_rate: 2.0
  minimum_training_samples: 200
  log_level: "INFO"
schema:
  sample_rate: float
  minimum_training_samples: int
  log_level: list(DEBUG|INFO|WARNING|ERROR|CRITICAL)
startup: application
boot: auto
