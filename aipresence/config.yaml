# Home Assistant Add-on manifest
# https://developers.home-assistant.io/docs/add-ons/configuration
name: AIPresence
version: "0.1.0-dev.4"
slug: aipresence
description: "Room-level presence detection using BLE signal ML classification"
url: "https://github.com/mhentschke/AIPresence"
image: ghcr.io/mhentschke/aipresence-{arch}
arch:
  - amd64
  - aarch64
  - armv7
homeassistant_api: true
ingress: true
ingress_port: 8099
panel_icon: "mdi:crosshairs-gps"
panel_title: "AIPresence"
map:
  - type: data
    read_only: false
options:
  sample_rate: 2.0
  minimum_training_samples: 200
  log_level: "INFO"
schema:
  sample_rate: float
  minimum_training_samples: int
  log_level: list(DEBUG|INFO|WARNING|ERROR|CRITICAL)
startup: application
boot: auto
